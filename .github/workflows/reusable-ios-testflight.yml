name: Reusable iOS TestFlight

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_P8:
        required: true
      IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64:
        required: true
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:
        required: true
      IOS_APPSTORE_PROVISIONING_PROFILE_BASE64:
        required: true

jobs:
  ios_testflight:
    runs-on: macos-26
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Resolve Flutter version
        id: flutter
        shell: bash
        run: |
          version="$(ruby -rjson -e 'path=".fvmrc"; if File.exist?(path); raw=File.read(path).strip; begin; data=JSON.parse(raw); puts(data["flutter"] || data["flutterSdkVersion"] || raw); rescue JSON::ParserError; puts raw; end; else; puts "3.29.2"; end')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Flutter version: ${version}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: ios
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
            ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}-v1
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Recreate App Store Connect API key
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          missing=0
          for name in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_KEY_P8; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is not set"
              missing=1
            else
              echo "${name}: present"
            fi
          done
          [ "$missing" -eq 0 ]

          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APP_STORE_CONNECT_API_KEY_KEY_FILEPATH=$key_path" >> "$GITHUB_ENV"
          echo "App Store Connect key file exists: yes"

      - name: Install iOS signing assets
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          missing=0
          for name in IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 IOS_DISTRIBUTION_CERTIFICATE_PASSWORD IOS_APPSTORE_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is not set"
              missing=1
            else
              echo "${name}: present"
            fi
          done
          [ "$missing" -eq 0 ]

          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          cert_path="$RUNNER_TEMP/distribution.p12"
          profile_path="$RUNNER_TEMP/appstore.mobileprovision"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64" | decode_base64 > "$cert_path"
          printf '%s' "$IOS_APPSTORE_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          uuid="$(security cms -D -i "$profile_path" | plutil -extract UUID raw -o - -)"
          profile_name="$(security cms -D -i "$profile_path" | plutil -extract Name raw -o - -)"
          profile_team="$(security cms -D -i "$profile_path" | plutil -extract TeamIdentifier.0 raw -o - -)"
          profile_bundle="$(security cms -D -i "$profile_path" | plutil -extract Entitlements.application-identifier raw -o - - | sed 's/^[^.]*\.//')"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${uuid}.mobileprovision"

          echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
          echo "Provisioning profile installed: yes"
          echo "Provisioning profile bundle id: ${profile_bundle}"
          echo "Provisioning profile team id: ${profile_team}"

      - name: Verify iOS bundle id
        shell: bash
        run: |
          appfile_id="$(ruby -ne 'puts $1 if /app_identifier\("([^"]+)"\)/ =~ $_' ios/fastlane/Appfile)"
          project_id="$(ruby -ne 'puts $1 if /PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);/ =~ $_ && $1 !~ /RunnerTests/' ios/Runner.xcodeproj/project.pbxproj | head -1)"
          echo "Xcode bundle id: ${project_id}"
          echo "Fastlane app_identifier: ${appfile_id}"
          test "$project_id" = "$appfile_id"

      - name: Build and upload iOS IPA to TestFlight
        working-directory: ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: bundle exec fastlane ios beta

      - name: Upload gym logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gym-logs
          path: ~/Library/Logs/gym
